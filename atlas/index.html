<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0c1120">
<meta name="description" content="Paperclip Atlas: a living mindmap command surface for autonomous AI companies.">
<title>Paperclip Atlas · org command surface</title>
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: oklch(0.115 0.026 262); }
  #app { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
  /* Standalone demo harness. The engine itself is atlas/src/atlas.js — an
     embeddable ES module. To drive it from a live Paperclip server instead,
     swap demoModel() for createPaperclipAdapter() (see src/paperclip-adapter.js). */
  import { mountAtlas } from './src/atlas.js';
  import { demoModel } from './src/demo.js';

  const atlas = mountAtlas(document.getElementById('app'), {
    model: demoModel(),
    simulate: true,
    onAction: action => console.log('[atlas action]', action),
  });

  window.atlas = atlas;   // console access for tinkering
</script>
</body>
</html>
